<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$wish — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1A1408;
      --bg-surface: #302616;
      --gold: #C4922A;
      --gold-bright: #D4A535;
      --text-primary: #F0E6D0;
      --text-secondary: #B8A88A;
      --text-muted: #7A6E58;
      --border: rgba(196, 146, 42, 0.12);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .admin {
      max-width: 460px;
      width: 100%;
    }

    .admin-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 600;
      font-style: italic;
      color: var(--gold);
      text-align: center;
      margin-bottom: 2rem;
    }

    .field {
      margin-bottom: 1.2rem;
    }

    .field label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    .field input {
      width: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.8rem 1rem;
      color: var(--text-primary);
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.3s;
    }

    .field input:focus {
      border-color: var(--gold);
    }

    .field input::placeholder {
      color: var(--text-muted);
    }

    .btn-save {
      width: 100%;
      margin-top: 1rem;
      background: var(--gold);
      color: var(--bg);
      font-family: 'Nunito', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 14px;
      border-radius: 9999px;
      border: none;
      cursor: pointer;
      transition: background 0.3s;
    }

    .btn-save:hover {
      background: var(--gold-bright);
    }

    .status {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.8rem;
      min-height: 1.2rem;
      transition: color 0.3s;
    }

    .status.success { color: #6abf69; }
    .status.error { color: #d4453a; }
  </style>
</head>
<body>
  <div class="admin">
    <div class="admin-title">wish admin</div>

    <div class="field">
      <label>Contract Address</label>
      <input type="text" id="ca" placeholder="Paste CA...">
    </div>

    <div class="field">
      <label>Twitter URL</label>
      <input type="text" id="twitterUrl" placeholder="https://twitter.com/...">
    </div>

    <div class="field">
      <label>Community URL</label>
      <input type="text" id="communityUrl" placeholder="https://twitter.com/i/communities/...">
    </div>

    <div class="field">
      <label>Buy URL</label>
      <input type="text" id="buyUrl" placeholder="https://jup.ag/swap/SOL-...">
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Admin password">
    </div>

    <button class="btn-save" onclick="saveConfig()">Save Config</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    function showStatus(msg, type) {
      var el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + type;
      setTimeout(function() { el.textContent = ''; el.className = 'status'; }, 3000);
    }

    async function saveConfig() {
      var password = document.getElementById('password').value;
      if (!password) { showStatus('Enter password', 'error'); return; }

      var encoder = new TextEncoder();
      var hashBuffer = await crypto.subtle.digest('SHA-256', encoder.encode(password));
      var hashArray = Array.from(new Uint8Array(hashBuffer));
      var passwordHash = hashArray.map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');

      var configData = {
        passwordHash: passwordHash,
        ca: document.getElementById('ca').value,
        twitterUrl: document.getElementById('twitterUrl').value,
        communityUrl: document.getElementById('communityUrl').value,
        buyUrl: document.getElementById('buyUrl').value
      };

      try {
        var res = await fetch('/api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(configData)
        });
        if (res.ok) showStatus('Saved', 'success');
        else if (res.status === 401) showStatus('Wrong password', 'error');
        else showStatus('Failed to save', 'error');
      } catch (e) {
        showStatus('Connection error', 'error');
      }
    }

    async function loadConfig() {
      try {
        var res = await fetch('/api/config');
        if (res.ok) {
          var data = await res.json();
          if (data.ca) document.getElementById('ca').value = data.ca;
          if (data.twitterUrl) document.getElementById('twitterUrl').value = data.twitterUrl;
          if (data.communityUrl) document.getElementById('communityUrl').value = data.communityUrl;
          if (data.buyUrl) document.getElementById('buyUrl').value = data.buyUrl;
        }
      } catch (e) {
        console.log('Could not load config');
      }
    }

    document.addEventListener('DOMContentLoaded', loadConfig);
  </script>
</body>
</html>
